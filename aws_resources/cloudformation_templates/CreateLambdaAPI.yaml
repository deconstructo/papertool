AWSTemplateFormatVersion: 2010-09-09
Description: Creates Lambda function, RestAPI (using APIGateway) and Cognito for PaperTool
Metadata:
    Generator: "SoDa Labs"
    Author: "satyaborg"

Parameters:
  OIDCProviderUrl:
    Description: "OIDC provider issuer URL (e.g. https://accounts.google.com for Google)"
    Type: String
  OIDCClientId:
    Description: "Client ID from your OIDC provider"
    Type: String
  OIDCClientSecret:
    Description: "Client secret from your OIDC provider"
    Type: String
    NoEcho: true
  OIDCScopes:
    Description: "Space-separated OAuth scopes to request from the OIDC provider"
    Type: String
    Default: "email profile openid"
  CognitoDomainPrefix:
    Description: "Unique lowercase prefix for the Cognito hosted UI domain (letters, numbers, hyphens only)"
    Type: String
    AllowedPattern: "[a-z0-9-]+"
  SiteWebsiteUrl:
    Description: "Website URL of the site bucket (WebsiteURL output from S3 stack)"
    Type: String

Outputs:
  ApiEndpoint:
    Description: URL for invocation of the REST API.
    Value: !Sub "https://${ApiGatewayRestApi}.execute-api.${AWS::Region}.amazonaws.com/v1/upload"
  IdentityPoolId:
    Description: AWS Cognito identity pool ID.
    Value: !Ref CognitoIdentityPool
  UserPoolId:
    Description: Cognito User Pool ID.
    Value: !Ref CognitoUserPool
  UserPoolClientId:
    Description: Cognito User Pool Client ID.
    Value: !Ref CognitoUserPoolClient
  CognitoDomain:
    Description: Cognito hosted UI domain (use as cognitoDomain in settings.js).
    Value: !Sub "${CognitoDomainPrefix}.auth.${AWS::Region}.amazoncognito.com"

Resources:
  LambdaLayer:
    Type: "AWS::Lambda::LayerVersion"
    Properties:
      CompatibleRuntimes:
      - python3.9
      Content:
        S3Bucket: !ImportValue CodeBucket
        S3Key: layer.zip
      LayerName: wkhtmltopdf

  UploadLambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: uploadPaper
      Code:
        S3Bucket: !ImportValue CodeBucket
        S3Key: uploadWorkingPaper.zip
      Layers:
        - !Ref LambdaLayer
      Handler: lambda_function.lambda_handler
      Role: !GetAtt LambdaExecutionRole.Arn
      MemorySize: 256
      Timeout: 300
      Runtime: python3.9

  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
        - Effect: "Allow"
          Principal:
            Service:
            - lambda.amazonaws.com
          Action:
          - "sts:AssumeRole"
      Path: "/"
      Policies:
      - PolicyName: "AllowLogging"
        PolicyDocument:
          Version: "2012-10-17"
          Statement:
          - Effect: "Allow"
            Action:
            - logs:*
            Resource: arn:aws:logs:*:*:*
      - PolicyName: "AllowS3Access"
        PolicyDocument:
          Version: "2012-10-17"
          Statement:
          - Effect: "Allow"
            Action:
              - s3:GetObject
              - s3:PutObject
              - s3:DeleteObject
            Resource:
              - !Sub
                - "arn:aws:s3:::${WPB}/*"
                - WPB: !ImportValue WorkingPapersBucket
              - !Sub
                - "arn:aws:s3:::${SB}/*"
                - SB: !ImportValue SiteBucket
          - Effect: "Allow"
            Action:
              - s3:ListBucket
            Resource:
              - !Sub
                - "arn:aws:s3:::${WPB}"
                - WPB: !ImportValue WorkingPapersBucket
              - !Sub
                - "arn:aws:s3:::${SB}"
                - SB: !ImportValue SiteBucket

  LambdaInvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: "lambda:InvokeFunction"
      FunctionName: !GetAtt
        - UploadLambdaFunction
        - Arn
      Principal: apigateway.amazonaws.com

  ApiGatewayRestApi:
    Type: "AWS::ApiGateway::RestApi"
    Properties:
      Name: "uploadAPI"
      Description: "API for the working paper series"

  ApiGatewayResource:
    Type: "AWS::ApiGateway::Resource"
    Properties:
      RestApiId: !Ref ApiGatewayRestApi
      PathPart: "upload"
      ParentId: !GetAtt ApiGatewayRestApi.RootResourceId

  CognitoAuthorizer:
    Type: AWS::ApiGateway::Authorizer
    Properties:
      RestApiId: !Ref ApiGatewayRestApi
      Name: CognitoAuthorizer
      Type: COGNITO_USER_POOLS
      IdentitySource: method.request.header.Authorization
      ProviderARNs:
        - !GetAtt CognitoUserPool.Arn

  ApiGatewayMethod:
    Type: "AWS::ApiGateway::Method"
    Properties:
      RestApiId: !Ref ApiGatewayRestApi
      ResourceId: !Ref ApiGatewayResource
      HttpMethod: "POST"
      AuthorizationType: "COGNITO_USER_POOLS"
      AuthorizerId: !Ref CognitoAuthorizer
      ApiKeyRequired: false
      RequestParameters: {}
      MethodResponses:
      -
        ResponseParameters:
          "method.response.header.Access-Control-Allow-Origin": false
        StatusCode: "200"
      Integration:
        CacheNamespace: !Ref ApiGatewayResource
        ContentHandling: "CONVERT_TO_TEXT"
        IntegrationHttpMethod: "POST"
        IntegrationResponses:
        -
          ResponseParameters:
            "method.response.header.Access-Control-Allow-Origin": "'*'"
          ResponseTemplates: {}
          StatusCode: "200"
        PassthroughBehavior: "WHEN_NO_TEMPLATES"
        RequestTemplates:
          "application/json": |
              {
                  "content": {
                      #foreach( $token in $input.path('$').split('&') )
                          #set( $keyVal = $token.split('=') )
                          #set( $keyValSize = $keyVal.size() )
                          #if( $keyValSize >= 1 )
                              #set( $key = $util.urlDecode($keyVal[0]) )
                              #if( $keyValSize >= 2 )
                                  #set( $val = $util.urlDecode($keyVal[1]) )
                              #else
                                  #set( $val = '' )
                              #end
                              "$key": "$val"#if($foreach.hasNext),#end
                          #end
                      #end
                  }
              }
        TimeoutInMillis: 29000
        Type: "AWS"
        Uri:
          Fn::Join:
          - ''
          - - 'arn:aws:apigateway:'
            - Ref: AWS::Region
            - ":lambda:path/2015-03-31/functions/"
            - Fn::GetAtt:
              - UploadLambdaFunction
              - Arn
            - "/invocations"

  OptionsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      AuthorizationType: NONE
      RestApiId: !Ref ApiGatewayRestApi
      ResourceId: !Ref ApiGatewayResource
      HttpMethod: OPTIONS
      Integration:
        IntegrationResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
            method.response.header.Access-Control-Allow-Methods: "'GET,POST,PUT,DELETE,OPTIONS'"
            method.response.header.Access-Control-Allow-Origin: "'*'"
          ResponseTemplates:
            application/json: ''
        PassthroughBehavior: WHEN_NO_MATCH
        RequestTemplates:
          application/json: '{"statusCode": 200}'
        Type: MOCK
      MethodResponses:
      - StatusCode: 200
        ResponseModels:
          application/json: 'Empty'
        ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: false
            method.response.header.Access-Control-Allow-Methods: false
            method.response.header.Access-Control-Allow-Origin: false

  ApiGatewayDeployment:
    Type: "AWS::ApiGateway::Deployment"
    Properties:
      RestApiId: !Ref ApiGatewayRestApi
      StageName: "v1"
    DependsOn:
      - ApiGatewayMethod
      - OptionsMethod

  # Cognito User Pool for OIDC-based authentication
  CognitoUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub "${AWS::StackName}-user-pool"
      AutoVerifiedAttributes:
        - email
      Schema:
        - Name: email
          AttributeDataType: String
          Required: true
          Mutable: true

  CognitoUserPoolIdentityProvider:
    Type: AWS::Cognito::UserPoolIdentityProvider
    Properties:
      UserPoolId: !Ref CognitoUserPool
      ProviderName: OIDCProvider
      ProviderType: OIDC
      ProviderDetails:
        oidc_issuer: !Ref OIDCProviderUrl
        client_id: !Ref OIDCClientId
        client_secret: !Ref OIDCClientSecret
        attributes_request_method: GET
        authorize_scopes: !Ref OIDCScopes
      AttributeMapping:
        email: email

  CognitoUserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Ref CognitoDomainPrefix
      UserPoolId: !Ref CognitoUserPool

  CognitoUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      UserPoolId: !Ref CognitoUserPool
      ClientName: papertool-client
      GenerateSecret: false
      SupportedIdentityProviders:
        - OIDCProvider
        - COGNITO
      AllowedOAuthFlows:
        - code
      AllowedOAuthScopes:
        - openid
        - email
        - profile
      AllowedOAuthFlowsUserPoolClient: true
      CallbackURLs:
        - !Ref SiteWebsiteUrl
      LogoutURLs:
        - !Ref SiteWebsiteUrl
    DependsOn: CognitoUserPoolIdentityProvider

  CognitoIdentityPool:
    Type: "AWS::Cognito::IdentityPool"
    Properties:
      IdentityPoolName: !ImportValue CodeBucket
      AllowUnauthenticatedIdentities: false
      CognitoIdentityProviders:
        - ClientId: !Ref CognitoUserPoolClient
          ProviderName: !GetAtt CognitoUserPool.ProviderName
    DependsOn: CognitoUserPoolClient

  # Role for authenticated users: may upload to temp/ and read from both buckets
  CognitoAuthorizedRole:
    Type: "AWS::IAM::Role"
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: "Allow"
            Principal:
              Federated: "cognito-identity.amazonaws.com"
            Action:
              - "sts:AssumeRoleWithWebIdentity"
            Condition:
              StringEquals:
                "cognito-identity.amazonaws.com:aud": !Ref CognitoIdentityPool
              "ForAnyValue:StringLike":
                "cognito-identity.amazonaws.com:amr": authenticated
      Policies:
        - PolicyName: "CognitoAuthorizedPolicy"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: "Allow"
                Action:
                  - s3:PutObject
                Resource:
                  - !Sub
                    - "arn:aws:s3:::${WPB}/temp/*"
                    - WPB: !ImportValue WorkingPapersBucket
              - Effect: "Allow"
                Action:
                  - s3:GetObject
                Resource:
                  - !Sub
                    - "arn:aws:s3:::${WPB}/*"
                    - WPB: !ImportValue WorkingPapersBucket
                  - !Sub
                    - "arn:aws:s3:::${SB}/*"
                    - SB: !ImportValue SiteBucket
              - Effect: "Allow"
                Action:
                  - s3:ListBucket
                Resource:
                  - !Sub
                    - "arn:aws:s3:::${WPB}"
                    - WPB: !ImportValue WorkingPapersBucket
              - Effect: "Allow"
                Action:
                  - "mobileanalytics:PutEvents"
                  - "cognito-sync:*"
                Resource: "*"

  CognitoIdentityPoolRoleAttachment:
    Type: "AWS::Cognito::IdentityPoolRoleAttachment"
    Properties:
      IdentityPoolId: !Ref CognitoIdentityPool
      Roles:
        authenticated: !GetAtt CognitoAuthorizedRole.Arn
